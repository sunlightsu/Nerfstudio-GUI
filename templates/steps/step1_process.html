<form id="form-step1" class="step-form">
  <!-- 数据源类型 -->
  <fieldset>
    <legend>数据源</legend>
    <div class="form-row">
      <label>数据源类型</label>
      <div class="radio-group">
        <label class="radio-label"><input type="radio" name="data_type" value="images" checked> 图片 (images)</label>
        <label class="radio-label"><input type="radio" name="data_type" value="video"> 视频 (video)</label>
      </div>
    </div>
    <div class="form-row">
      <label for="proc-data">输入路径 <span class="required">*</span></label>
      <input id="proc-data" name="data" type="text" placeholder="E:\photos\my_scene" required>
    </div>
    <div class="form-row">
      <label for="proc-output">输出目录 <span class="required">*</span></label>
      <input id="proc-output" name="output_dir" type="text" placeholder="E:\data\processed" required>
    </div>
  </fieldset>

  <!-- 相机与 SfM -->
  <fieldset>
    <legend>相机与 SfM 配置</legend>
    <div class="form-row">
      <label for="proc-camera">相机类型</label>
      <select id="proc-camera" name="camera_type">
        <option value="perspective">perspective (透视)</option>
        <option value="fisheye">fisheye (鱼眼)</option>
        <option value="pinhole">pinhole (针孔)</option>
        <option value="simple_pinhole">simple_pinhole (简单针孔)</option>
      </select>
    </div>
    <div class="form-row">
      <label for="proc-matching">匹配方式</label>
      <select id="proc-matching" name="matching_method">
        <option value="vocab_tree">vocab_tree (推荐)</option>
        <option value="exhaustive">exhaustive (精确但慢)</option>
        <option value="sequential">sequential (快速/视频)</option>
      </select>
    </div>
    <div class="form-row">
      <label for="proc-sfm">SfM 工具</label>
      <select id="proc-sfm" name="sfm_tool">
        <option value="any">any (自动)</option>
        <option value="colmap">colmap</option>
        <option value="hloc">hloc</option>
      </select>
    </div>
    <div class="form-row">
      <label>GPU</label>
      <label class="switch-label"><input type="checkbox" name="gpu" value="true" checked> 启用 GPU</label>
    </div>
  </fieldset>

  <!-- 高级参数 -->
  <fieldset>
    <legend class="collapsible" data-target="proc-advanced">⚙ 高级参数 ▾</legend>
    <div id="proc-advanced" class="collapsed">
      <div class="form-row">
        <label for="proc-downscale">降采样次数</label>
        <input id="proc-downscale" name="num_downscales" type="number" min="0" max="5" placeholder="默认自动">
      </div>
      <div class="form-row">
        <label for="proc-maxsize">最大图像数</label>
        <input id="proc-maxsize" name="max_dataset_size" type="number" min="1" placeholder="不限">
      </div>
      <div class="form-row">
        <label for="proc-crop">裁剪比例</label>
        <input id="proc-crop" name="crop_factor" type="text" placeholder="0.0 0.0 0.0 0.0 (top bottom left right)">
      </div>
      <div class="form-row hloc-only">
        <label for="proc-feature">特征类型 (hloc)</label>
        <select id="proc-feature" name="feature_type">
          <option value="">默认</option>
          <option value="superpoint_aachen">superpoint_aachen</option>
          <option value="superpoint_max">superpoint_max</option>
          <option value="superpoint_inloc">superpoint_inloc</option>
          <option value="r2d2">r2d2</option>
          <option value="d2net-ss">d2net-ss</option>
          <option value="sosnet">sosnet</option>
          <option value="disk">disk</option>
        </select>
      </div>
      <div class="form-row hloc-only">
        <label for="proc-matcher">匹配器 (hloc)</label>
        <select id="proc-matcher" name="matcher_type">
          <option value="">默认</option>
          <option value="superglue">superglue</option>
          <option value="superglue-fast">superglue-fast</option>
          <option value="disk+lightglue">disk+lightglue</option>
          <option value="superpoint+lightglue">superpoint+lightglue</option>
        </select>
      </div>
      <div class="form-row hloc-only">
        <label>Pixel-Perfect SfM</label>
        <label class="switch-label"><input type="checkbox" name="refine_pixsfm" value="true"> 启用</label>
      </div>
      <div class="form-row">
        <label>精化内参</label>
        <label class="switch-label"><input type="checkbox" name="refine_intrinsics" value="true" checked> 启用</label>
      </div>
      <div class="form-row">
        <label>SfM 深度图</label>
        <label class="switch-label"><input type="checkbox" name="use_sfm_depth" value="true"> 启用</label>
      </div>
      <div class="form-row">
        <label>跳过 COLMAP</label>
        <label class="switch-label"><input type="checkbox" name="skip_colmap" value="true"> 启用</label>
      </div>
      <!-- video 专属 -->
      <div class="form-row video-only">
        <label for="proc-fps">每秒抽帧数</label>
        <input id="proc-fps" name="num_frames_per_second" type="number" min="0.1" step="0.1" placeholder="默认 1">
      </div>
      <div class="form-row video-only">
        <label for="proc-start">起始帧</label>
        <input id="proc-start" name="start_frame" type="number" min="0" placeholder="0">
      </div>
      <div class="form-row video-only">
        <label for="proc-end">结束帧</label>
        <input id="proc-end" name="end_frame" type="number" min="0" placeholder="末尾">
      </div>
    </div>
  </fieldset>

  <button type="submit" class="btn-run">▶ 开始预处理</button>
</form>
